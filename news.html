<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="news/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVITA — News</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8fb;--sf:#ffffff;--sf2:#f0f2f7;--bd:rgba(0,0,0,.05);--bd2:rgba(0,0,0,.09);--tx:#1a2332;--tx2:rgba(26,35,50,.58);--tx3:rgba(26,35,50,.32);--ac:#4f6ef7;--ac2:#3b5ce4;--acbg:rgba(79,110,247,.05);--r:14px;--f:'Inter',system-ui,sans-serif;--shadow:0 1px 4px rgba(0,0,0,.05),0 0 1px rgba(0,0,0,.03);--shadow-md:0 4px 12px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}

.header{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.logo .dot{width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 0 3px var(--acbg)}
.header-sep{width:1px;height:20px;background:var(--bd2)}
.header-section{font-size:13px;font-weight:600;color:var(--tx2)}
.header-right{display:flex;align-items:center;gap:14px}
.back-link{font-size:12px;color:var(--ac);font-weight:500;display:flex;align-items:center;gap:4px;transition:opacity .15s}
.back-link:hover{opacity:.7}

/* Lang toggle */
.lang-toggle{display:flex;border:1px solid var(--bd2);border-radius:6px;overflow:hidden;font-size:11px;font-weight:600}
.lang-btn{padding:4px 10px;cursor:pointer;color:var(--tx3);background:transparent;border:none;font-family:var(--f);font-size:11px;font-weight:600;transition:all .15s}
.lang-btn:hover{color:var(--tx)}
.lang-btn.active{background:var(--ac);color:#fff}

.page{max-width:960px;margin:0 auto;padding:40px 24px 80px}
.page-head{margin-bottom:36px}
.page-head h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
.page-head p{font-size:13px;color:var(--tx2);margin-top:6px;line-height:1.6}

.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

.news-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:all .2s;box-shadow:var(--shadow);display:flex;flex-direction:column}
.news-card:hover{border-color:var(--bd2);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.news-thumb{width:100%;height:180px;background:var(--sf2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.news-thumb img{width:100%;height:100%;object-fit:cover}
.news-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.badge-presentation{background:rgba(79,110,247,.12);color:var(--ac2)}
.badge-research{background:rgba(34,197,94,.1);color:#1a9956}
.badge-tool{background:rgba(249,115,22,.1);color:#c05a10}
.news-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column}
.news-date{font-size:10px;color:var(--tx3);font-weight:500;margin-bottom:6px}
.news-title{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:6px}
.news-desc{font-size:12px;color:var(--tx2);line-height:1.55;flex:1}
.news-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px}
.news-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--sf2);color:var(--tx3)}
.news-cta{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:11px;font-weight:600;color:var(--ac);transition:gap .15s}
.news-card:hover .news-cta{gap:8px}
.news-views{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:4px}

[data-ru]{display:none!important}
body.lang-ru [data-ru]{display:block!important}
/* inline variants */
body.lang-ru span[data-ru]{display:inline!important}

@media(max-width:640px){
  .header{padding:0 16px}
  .page{padding:24px 16px 60px}
  .news-grid{grid-template-columns:1fr}
  .page-head h1{font-size:22px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="logo"><span class="dot"></span>SVITA</a>
    <span class="header-sep"></span>
    <span class="header-section">News</span>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    </div>
    <a href="/" class="back-link"><span data-en>&larr; Dashboard</span><span data-ru>&larr; Dashboard</span></a>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <h1>
      <span data-en>AI & Neural Networks</span>
      <span data-ru>AI & Нейронные сети</span>
    </h1>
    <p data-en>Presentations, research, and tools — everything we build and discover in the world of artificial intelligence.</p>
    <p data-ru>Презентации, исследования и инструменты — всё, что мы создаём и открываем в мире искусственного интеллекта.</p>
  </div>

  <div class="news-grid" id="newsGrid"></div>
</div>

<script>
var SUPABASE_URL='https://ctdleobjnzniqkqomlrq.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0ZGxlb2JqbnpuaXFrcW9tbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MTEsImV4cCI6MjA4NzgwNzgxMX0.AMHtY7zGPemKYCxMy2bqRTOEAp8trA_Slor9wmg7C38';

function setLang(lang){
  document.body.classList.toggle('lang-ru', lang==='ru');
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});
  localStorage.setItem('svita_news_lang',lang);
}

function renderCard(p){
  return '<a href="'+p.href+'" class="news-card" data-page="'+p.href+'">'
    +'<div class="news-thumb" style="background:'+p.thumb_gradient+'">'
    +'<div style="text-align:center;color:'+p.thumb_color+';font-size:28px;font-weight:800;opacity:.7">'+p.thumb_text+'<br><span style="font-size:16px;color:'+p.thumb_sub_color+';font-weight:300">'+p.thumb_sub+'</span></div>'
    +'<span class="news-badge badge-'+p.badge_type+'">'+p.badge+'</span>'
    +'</div>'
    +'<div class="news-body">'
    +'<div class="news-date"><span data-en>'+p.date_en+'</span><span data-ru>'+p.date_ru+'</span></div>'
    +'<div class="news-views">\uD83D\uDC41 <span class="view-count">&mdash;</span></div>'
    +'<div class="news-title"><span data-en>'+p.title_en+'</span><span data-ru>'+p.title_ru+'</span></div>'
    +'<div class="news-desc"><span data-en>'+p.desc_en+'</span><span data-ru>'+p.desc_ru+'</span></div>'
    +'<div class="news-tags">'+p.tags.map(function(t){return '<span class="news-tag">'+t+'</span>'}).join('')+'</div>'
    +'<div class="news-cta"><span data-en>Open &rarr;</span><span data-ru>Открыть &rarr;</span></div>'
    +'</div></a>';
}

function loadViewCounters(){
  document.querySelectorAll('.news-card[data-page]').forEach(function(card){
    var page=card.getAttribute('data-page');
    var el=card.querySelector('.view-count');
    fetch(SUPABASE_URL+'/rest/v1/rpc/get_page_views',{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({p_page:page})
    })
    .then(function(r){return r.json()})
    .then(function(count){el.textContent=typeof count==='number'?count:'0'})
    .catch(function(){el.textContent='0'});
  });
}

fetch('/news/posts.json')
  .then(function(r){return r.json()})
  .then(function(posts){
    document.getElementById('newsGrid').innerHTML=posts.map(renderCard).join('');
    var saved=localStorage.getItem('svita_news_lang');
    if(saved)setLang(saved);
    loadViewCounters();
  })
  .catch(function(){
    document.getElementById('newsGrid').innerHTML='<p style="color:var(--tx3);font-size:13px">Failed to load posts</p>';
  });

(function(){
  var saved=localStorage.getItem('svita_news_lang');
  if(saved)setLang(saved);
})();
</script>
<script src="/js/news-edit.js"></script>
</body>
</html>
