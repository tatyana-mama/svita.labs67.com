<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SVITA migrate</title></head>
<body>
<script>
// This page runs on svita.labs67.com inside an iframe on dashboard.svita.ai
// It sends all svita_* localStorage keys to the parent via postMessage
var data = {};
for (var i = 0; i < localStorage.length; i++) {
  var k = localStorage.key(i);
  if (k && (k.indexOf('svita_') === 0 || k.indexOf('u_') === 0)) {
    data[k] = localStorage.getItem(k);
  }
}
window.parent.postMessage({type:'svita_migrate', data: data}, '*');
</script>
</body></html>
